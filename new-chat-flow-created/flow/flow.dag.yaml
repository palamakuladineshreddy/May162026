$schema: https://azuremlschemas.azureedge.net/promptflow/latest/Flow.schema.json
environment:
  python_requirements_txt: requirements.txt
inputs:
  chat_history:
    type: list
    is_chat_history: true
    default: []
  question:
    type: string
    is_chat_input: true
outputs:
  answer:
    type: string
    reference: ${chat.output}
    is_chat_output: true
nodes:
- name: chat
  type: llm
  source:
    type: code
    path: chat.jinja2
  inputs:
    deployment_name: gpt-5-mini
    temperature: 1
    question: ${inputs.question}
    contexts: ${python_node_wu3u.output}
  connection: azure_openai_connection
  api: chat
- name: python_node_wu3u
  type: python
  source:
    type: code
    path: python_node_wu3u.py
  inputs:
    search_connection: azure_openaisearch_connection
    query: ${inputs.chat_history}
    index_name: rag-index
